<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#FFFFFF">
<title>내 자산 포트폴리오</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#F2F4F6; --card:#FFFFFF;
    --text:#191F28; --text2:#4E5968; --text3:#8B95A1;
    --blue:#3182F6; --up:#F04452; --down:#3182F6;
    --line:#F2F4F6; --chip:#F2F4F6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
    background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:480px;margin:0 auto;padding:14px 14px 40px;}
  .card{
    background:var(--card); border-radius:20px;
    padding:20px 18px; margin-bottom:13px;
    box-shadow:0 2px 10px rgba(0,0,0,.04);
  }
  .card-title{font-size:16px;font-weight:700;letter-spacing:-.2px;}
  .card-sub{font-size:12px;font-weight:600;color:var(--text3);margin-left:6px;}
  .card-desc{font-size:12px;color:var(--text3);margin-top:3px;}

  /* header */
  .header-card{padding:24px 20px;}
  .app-title{font-size:14px;font-weight:600;color:var(--text2);}
  .base-month{font-size:12px;font-weight:600;color:var(--text3);margin-top:2px;}
  .total-amount{font-size:32px;font-weight:800;letter-spacing:-1px;margin-top:12px;}
  .mom{
    display:inline-flex;align-items:center;gap:4px;margin-top:10px;
    font-size:13px;font-weight:700;padding:6px 11px;border-radius:999px;
    background:#FFF0F1;color:var(--up);
  }
  .mom.neg{background:#EAF2FE;color:var(--down);}
  .mom .sub{font-weight:600;opacity:.85;}
  .header-foot{
    display:flex;gap:8px;margin-top:16px;
  }
  .mini{
    flex:1;background:var(--chip);border-radius:14px;padding:12px 13px;
  }
  .mini .k{font-size:11px;font-weight:600;color:var(--text3);}
  .mini .v{font-size:15px;font-weight:800;margin-top:3px;letter-spacing:-.3px;}

  .chart-box{position:relative;width:100%;}
  .h-donut{height:240px;}
  .h-chart{height:250px;}

  /* donut legend */
  .legend{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;margin-top:16px;}
  .lg-row{display:flex;align-items:center;gap:8px;min-width:0;}
  .dot{width:10px;height:10px;border-radius:3px;flex:none;}
  .lg-name{font-size:13px;font-weight:600;color:var(--text2);flex:none;}
  .lg-val{margin-left:auto;text-align:right;min-width:0;}
  .lg-pct{font-size:13px;font-weight:700;}
  .lg-amt{font-size:11px;color:var(--text3);font-weight:500;}

  .legend-row{display:flex;flex-wrap:wrap;gap:7px 12px;margin-top:14px;}
  .li{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text2);}

  /* rebalancing */
  .rb-summary{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--chip);border-radius:14px;padding:12px 14px;margin:14px 0 6px;
  }
  .rb-summary .lab{font-size:12px;font-weight:600;color:var(--text3);}
  .rb-summary .sum{font-size:14px;font-weight:800;}
  .rb-summary .sum.ok{color:var(--blue);}
  .rb-summary .sum.bad{color:var(--up);}
  .rb-head,.rb-row{
    display:grid;grid-template-columns:1.5fr 1fr 1.25fr 1.4fr;
    align-items:center;gap:6px;
  }
  .rb-head{padding:10px 2px 8px;border-bottom:1px solid var(--line);}
  .rb-head span{font-size:11px;font-weight:600;color:var(--text3);}
  .rb-head span:nth-child(n+2){text-align:right;}
  .rb-row{padding:11px 2px;border-bottom:1px solid var(--line);}
  .rb-row:last-child{border-bottom:none;}
  .rb-asset{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;}
  .rb-cur{font-size:13px;font-weight:600;color:var(--text2);text-align:right;}
  .rb-input-wrap{display:flex;align-items:center;justify-content:flex-end;gap:2px;}
  .rb-input{
    width:64px;border:1px solid #E5E8EB;border-radius:9px;
    padding:7px 8px;font-size:13px;font-weight:700;text-align:right;
    font-family:inherit;color:var(--text);background:#fff;
  }
  .rb-input:focus{outline:none;border-color:var(--blue);}
  .rb-pct{font-size:12px;font-weight:600;color:var(--text3);}
  .rb-act{font-size:12.5px;font-weight:700;text-align:right;letter-spacing:-.2px;}
  .rb-act.buy{color:var(--up);}
  .rb-act.sell{color:var(--down);}
  .rb-act.keep{color:var(--text3);}
  .rb-reset{
    width:100%;margin-top:14px;padding:13px;border:none;border-radius:13px;
    background:var(--chip);color:var(--text2);font-size:13px;font-weight:700;
    font-family:inherit;cursor:pointer;
  }
  .rb-reset:active{background:#E8EBED;}

  .footer{text-align:center;font-size:11px;color:var(--text3);
    line-height:1.6;margin-top:18px;}

  /* PIN 잠금 */
  #lock{position:fixed;inset:0;background:#fff;z-index:9999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  #lock.hide{display:none;}
  .lock-title{font-size:19px;font-weight:800;letter-spacing:-.3px;}
  .lock-sub{font-size:13px;color:var(--text3);margin-top:7px;}
  .lock-dots{display:flex;gap:16px;margin:30px 0 8px;}
  .lock-dots span{width:13px;height:13px;border-radius:50%;background:#E5E8EB;transition:.12s;}
  .lock-dots span.on{background:var(--blue);}
  #lock.err .lock-dots{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}
    40%,80%{transform:translateX(7px)}}
  .lock-err{font-size:12px;color:var(--up);height:15px;margin-bottom:16px;font-weight:600;}
  .keypad{display:grid;grid-template-columns:repeat(3,70px);gap:14px;}
  .keypad button{height:60px;border:none;background:var(--chip);border-radius:50%;
    font-size:22px;font-weight:600;font-family:inherit;color:var(--text);cursor:pointer;}
  .keypad button:active{background:#E1E4E8;}
  .keypad button.blank{background:none;cursor:default;}

  /* Privacy 토글 */
  .hd-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .privacy-btn{flex:none;border:none;border-radius:999px;padding:7px 12px;
    font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;
    background:var(--chip);color:var(--text2);white-space:nowrap;}
  .privacy-btn.on{background:var(--blue);color:#fff;}
  .privacy-btn:active{opacity:.85;}
</style>
</head>

  </div>

  <div class="footer" id="footer"></div>
</div>

/* ---------- PIN 잠금 ---------- */
const PIN='0415';
(function(){
  const lock=document.getElementById('lock');
  if(sessionStorage.getItem('pin_ok')==='1'){lock.classList.add('hide');return;}
  const dots=document.querySelectorAll('.lock-dots span');
  const err=document.getElementById('pinErr');
  const kp=document.getElementById('keypad');
  let entered='';
  ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{
    const b=document.createElement('button');
    if(!k){b.className='blank';b.disabled=true;}
    else{b.textContent=k;b.addEventListener('click',()=>press(k));}
    kp.appendChild(b);
  });
  function render(){dots.forEach((d,i)=>d.classList.toggle('on',i<entered.length));}
  function press(k){
    err.textContent='';lock.classList.remove('err');
    if(k==='⌫'){entered=entered.slice(0,-1);render();return;}
    if(entered.length>=4)return;
    entered+=k;render();
    if(entered.length===4){
      if(entered===PIN){sessionStorage.setItem('pin_ok','1');lock.classList.add('hide');}
      else{lock.classList.add('err');err.textContent='PIN이 일치하지 않아요';
        setTimeout(()=>{entered='';render();lock.classList.remove('err');},450);}
    }
  }
  render();
})();

function fmtKR(v){
  v=Math.round(v||0); const neg=v<0; v=Math.abs(v);
  const eok=Math.floor(v/1e8), man=Math.floor((v%1e8)/1e4);
  let s='';
  if(eok) s+=eok+'억 ';
  if(man) s+=man.toLocaleString()+'만';
  if(!eok && !man) s='0';
  return (neg?'-':'')+s.trim()+'원';
}
function fmtKRshort(v){
  v=Math.round(v||0); const neg=v<0; v=Math.abs(v);
  const eok=v/1e8;
  let s = eok>=1 ? eok.toFixed(2).replace(/\.?0+$/,'')+'억원'
                 : Math.round(v/1e4).toLocaleString()+'만원';
  return (neg?'-':'')+s;
}
function mLabel(ym){const p=ym.split('-');return p[0].slice(2)+'.'+(+p[1]);}
const C = a => DATA.colors[a] || '#ADB5BD';

/* ---------- 헤더 ---------- */
document.getElementById('baseMonth').textContent = DATA.latest_label + ' 기준';
document.getElementById('donutMonth').textContent = DATA.latest_label;
setMoney('totalAmount', fmtKR(DATA.total));
const up = DATA.mom_change >= 0;
const momAmt = fmtKRshort(Math.abs(DATA.mom_change));
const badge = document.getElementById('momBadge');
badge.className = 'mom' + (up?'':' neg');
badge.innerHTML = (up?'▲':'▼') + ' <span class="js-money" data-full="'+momAmt+'">'+momAmt+'</span>' +
  ' <span class="sub">(' + (up?'+':'') + DATA.mom_pct.toFixed(1) + '%)</span>';
setMoney('miniMom', (up?'+':'-') + momAmt);
document.getElementById('miniMom').style.color = up?'var(--up)':'var(--down)';
const pUp = DATA.profit_12m >= 0;
setMoney('miniProfit', (pUp?'+':'-') + fmtKRshort(Math.abs(DATA.profit_12m)));
document.getElementById('miniProfit').style.color = pUp?'var(--up)':'var(--down)';

/* ---------- 플러그인 ---------- */
const shadowPlugin = {
  id:'shadow',
  beforeDatasetsDraw(c){const x=c.ctx;x.save();
    x.shadowColor='rgba(33,50,80,.22)';x.shadowBlur=16;x.shadowOffsetY=8;},
  afterDatasetsDraw(c){c.ctx.restore();}
};
const centerText = {
  id:'centerText',
  afterDatasetsDraw(c){
    const m=c.getDatasetMeta(0).data[0]; if(!m) return;
    const x=c.ctx, cx=m.x, cy=m.y;
    x.save();x.textAlign='center';
    x.fillStyle='#8B95A1';x.font='600 12px Pretendard';
    x.fillText('총 자산', cx, cy-12);
    if(privacyMode){
      x.fillStyle='#191F28';x.font='800 20px Pretendard';
      x.fillText(PMASK, cx, cy+13);
    }else{
      x.fillStyle='#191F28';x.font='800 18px Pretendard';
      x.fillText(fmtKR(DATA.total).replace('원',''), cx, cy+11);
      x.fillStyle='#8B95A1';x.font='600 11px Pretendard';
      x.fillText('원', cx, cy+27);
    }
    x.restore();
  }
};
Chart.defaults.font.family='Pretendard';
Chart.defaults.color='#8B95A1';

/* ---------- 1. 도넛 ---------- */
const donutAssets = DATA.assets.filter(a => DATA.current[a] > 0);
const donutChart = new Chart(document.getElementById('donut'),{
  type:'doughnut',
  data:{labels:donutAssets,
    datasets:[{data:donutAssets.map(a=>DATA.current[a]),
      backgroundColor:donutAssets.map(C),borderColor:'#fff',
      borderWidth:3,spacing:2,hoverOffset:7}]},
  options:{responsive:true,maintainAspectRatio:false,cutout:'66%',
    layout:{padding:14},
    plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>' '+c.label+'  '+(privacyMode?PMASK:fmtKR(c.parsed))+
        '  ('+(c.parsed/DATA.total*100).toFixed(1)+'%)'}}}},
  plugins:[shadowPlugin,centerText]
});
/* 도넛 범례 */
const lg=document.getElementById('donutLegend');
DATA.assets.slice().sort((a,b)=>DATA.current[b]-DATA.current[a]).forEach(a=>{
  const pct=DATA.total?DATA.current[a]/DATA.total*100:0;
  const d=document.createElement('div');d.className='lg-row';
  d.innerHTML=`<span class="dot" style="background:${C(a)}"></span>`+
    `<span class="lg-name">${a}</span>`+
    `<span class="lg-val"><div class="lg-pct">${pct.toFixed(1)}%</div>`+
    `<div class="lg-amt js-money" data-full="${fmtKRshort(DATA.current[a])}">${fmtKRshort(DATA.current[a])}</div></span>`;
  lg.appendChild(d);
});

/* ---------- 2. 누적 막대 ---------- */
const barChart = new Chart(document.getElementById('barChart'),{
  type:'bar',
  data:{labels:DATA.months.map(mLabel),
    datasets:DATA.assets.map(a=>({label:a,data:DATA.valuation_series[a],
      backgroundColor:C(a),borderWidth:0,
      borderRadius:2,categoryPercentage:.7,barPercentage:.9}))},
  options:{responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    scales:{
      x:{stacked:true,grid:{display:false},
        ticks:{font:{size:11}}},
      y:{stacked:true,border:{display:false},
        grid:{color:'#F2F4F6'},
        ticks:{font:{size:11},callback:v=>privacyMode?'':(v/1e8).toFixed(1)+'억'}}},
    plugins:{legend:{display:false},
      tooltip:{callbacks:{
        title:i=>i[0].label,
        label:c=>c.parsed.y>0?' '+c.dataset.label+(privacyMode?'':' '+fmtKRshort(c.parsed.y)):null,
        footer:i=>privacyMode?'':'합계 '+fmtKR(i.reduce((s,x)=>s+x.parsed.y,0))}}}}
});

/* ---------- 3. 수익률 라인 ---------- */
const retSets=[];
DATA.invest_assets.forEach(a=>{
  retSets.push({label:a,
    data:DATA.return_series[a].map((v,i)=>
      DATA.valuation_series[a][i]>0?v:null),
    borderColor:C(a),backgroundColor:C(a),
    borderWidth:2,tension:.35,pointRadius:2,pointHoverRadius:4,spanGaps:true});
});
retSets.push({label:'포트폴리오 전체',data:DATA.return_series['포트폴리오'],
  borderColor:'#191F28',backgroundColor:'#191F28',
  borderWidth:3,borderDash:[5,3],tension:.35,pointRadius:0,pointHoverRadius:4});
new Chart(document.getElementById('lineChart'),{
  type:'line',
  data:{labels:DATA.months.map(mLabel),datasets:retSets},
  options:{responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    scales:{
      x:{grid:{display:false},ticks:{font:{size:11}}},
      y:{border:{display:false},grid:{color:'#F2F4F6'},
        ticks:{font:{size:11},callback:v=>v+'%'}}},
    plugins:{
      legend:{position:'bottom',labels:{boxWidth:8,boxHeight:8,

/* ---------- 4. 비중 변화 영역 ---------- */
new Chart(document.getElementById('areaChart'),{
  type:'line',
  data:{labels:DATA.months.map(mLabel),
    datasets:DATA.assets.map(a=>({label:a,data:DATA.weight_series[a],
      borderColor:C(a),backgroundColor:C(a)+'E0',
      borderWidth:0,fill:true,tension:.3,pointRadius:0,
      pointHoverRadius:3}))},
  options:{responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    scales:{
      x:{grid:{display:false},ticks:{font:{size:11}}},
      y:{stacked:true,min:0,max:100,border:{display:false},
        grid:{color:'#F2F4F6'},
        ticks:{font:{size:11},stepSize:25,callback:v=>v+'%'}}},
    plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>c.parsed.y>0.05?
        ' '+c.dataset.label+'  '+c.parsed.y.toFixed(1)+'%':null}}}}
});
const al=document.getElementById('areaLegend');
DATA.assets.forEach(a=>{
  const d=document.createElement('div');d.className='li';
  d.innerHTML=`<span class="dot" style="background:${C(a)}"></span>${a}`;
  al.appendChild(d);
});

/* ---------- 5. 리밸런싱 ---------- */
const KEY='portfolio_targets_v1';
const curW={}; DATA.assets.forEach(a=>
  curW[a]=DATA.total?DATA.current[a]/DATA.total*100:0);
let targets=loadTargets();
function loadTargets(){
  try{const s=JSON.parse(localStorage.getItem(KEY));
    if(s&&DATA.assets.every(a=>typeof s[a]==='number'))return s;}catch(e){}
  const t={};DATA.assets.forEach(a=>t[a]=+curW[a].toFixed(1));return t;
}
function saveTargets(){try{localStorage.setItem(KEY,JSON.stringify(targets));}catch(e){}}
function renderRB(){
  const body=document.getElementById('rbBody');body.innerHTML='';
  let sum=0;DATA.assets.forEach(a=>sum+=(+targets[a]||0));
  const sEl=document.getElementById('rbSum');
  sEl.textContent=sum.toFixed(1)+'%';
  sEl.className='sum '+(Math.abs(sum-100)<0.5?'ok':'bad');
  DATA.assets.forEach(a=>{
    const tgt=+targets[a]||0;
    const diffAmt=(tgt-curW[a])/100*DATA.total;
    let act='유지',cls='keep';
    if(diffAmt>DATA.total*0.001){act=(privacyMode?'':'+'+fmtKRshort(diffAmt)+' ')+'매수';cls='buy';}
    else if(diffAmt<-DATA.total*0.001){act=(privacyMode?'':fmtKRshort(diffAmt)+' ')+'매도';cls='sell';}
    const row=document.createElement('div');row.className='rb-row';
    row.innerHTML=
      `<div class="rb-asset"><span class="dot" style="background:${C(a)}"></span>${a}</div>`+
      `<div class="rb-cur">${curW[a].toFixed(1)}%</div>`+
      `<div class="rb-input-wrap"><input class="rb-input" type="number" `+
        `inputmode="decimal" step="0.1" min="0" data-a="${a}" value="${tgt}"></div>`+
      `<div class="rb-act ${cls}">${act}</div>`;
    body.appendChild(row);
  });
  body.querySelectorAll('.rb-input').forEach(inp=>{
    inp.addEventListener('input',e=>{
      targets[e.target.dataset.a]=parseFloat(e.target.value)||0;
      saveTargets();
      let s=0;DATA.assets.forEach(a=>s+=(+targets[a]||0));
      const se=document.getElementById('rbSum');
      se.textContent=s.toFixed(1)+'%';
      se.className='sum '+(Math.abs(s-100)<0.5?'ok':'bad');
      const a=e.target.dataset.a;
      const tgt=+targets[a]||0;
      const diffAmt=(tgt-curW[a])/100*DATA.total;
      const actEl=e.target.closest('.rb-row').querySelector('.rb-act');
      if(diffAmt>DATA.total*0.001){actEl.textContent=(privacyMode?'':'+'+fmtKRshort(diffAmt)+' ')+'매수';actEl.className='rb-act buy';}
      else if(diffAmt<-DATA.total*0.001){actEl.textContent=(privacyMode?'':fmtKRshort(diffAmt)+' ')+'매도';actEl.className='rb-act sell';}
      else{actEl.textContent='유지';actEl.className='rb-act keep';}
    });
  });
}
document.getElementById('rbReset').addEventListener('click',()=>{
  DATA.assets.forEach(a=>targets[a]=+curW[a].toFixed(1));
  saveTargets();renderRB();
});
/* ---------- Privacy 토글 ---------- */
function applyPrivacy(){
  document.querySelectorAll('.js-money').forEach(el=>{
    el.textContent=privacyMode?PMASK:el.dataset.full;
  });
  const btn=document.getElementById('privacyToggle');
  btn.textContent=privacyMode?'금액 표시':'금액 가리기';
  btn.classList.toggle('on',privacyMode);
  donutChart.update();barChart.update();renderRB();
}
document.getElementById('privacyToggle').addEventListener('click',()=>{
  privacyMode=!privacyMode;
  try{localStorage.setItem('pf_privacy',privacyMode?'1':'0');}catch(e){}
  applyPrivacy();
});
applyPrivacy();

/* ---------- 푸터 ---------- */
document.getElementById('footer').innerHTML=
  '마지막 갱신 '+DATA.generated_at+'<br>데이터 출처: 자산 포트폴리오.xlsx';
</script>
</body>
